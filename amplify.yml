version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "Copying Amplify configuration..."
        - cp public/amplify_outputs.json public/amplify_outputs.json.backup || true
  artifacts:
    baseDirectory: /public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

