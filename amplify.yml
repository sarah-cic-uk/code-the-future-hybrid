version: 1
backend:
  phases:
    build:
      commands:
        # Backend lives in amplify-backend/. Deploy the Gen2 backend for this branch.
        - cd amplify-backend && npm ci && npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Use the backend the pipeline just deployed (not the committed sandbox file)
        - cp amplify-backend/amplify_outputs.json public/amplify_outputs.json
  artifacts:
    baseDirectory: /public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

