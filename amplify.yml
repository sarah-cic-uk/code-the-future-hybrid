version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "Building Amplify configuration..."
        - cd amplify-backend && npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID --out-dir ../public
  artifacts:
    baseDirectory: /public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - amplify-backend/node_modules/**/*

