version: 1
backend:
  phases:
    build:
      commands:
        # Backend lives in amplify-backend/. Deploy the Gen2 backend for this branch
        # and write amplify_outputs.json straight into the frontend folder (public/).
        - cd amplify-backend && npm ci && npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --outputs-out-dir ../public
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Show which backend the deployed app will talk to (should be the branch endpoint, not the sandbox)
        - node -e "const c=require('./public/amplify_outputs.json'); console.log('Frontend using backend endpoint:', c.data.url)"
  artifacts:
    baseDirectory: /public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

