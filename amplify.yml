version: 1
backend:
  phases:
    build:
      commands:
        # Backend lives in amplify-backend/. Deploy the Gen2 backend for this branch
        # and write amplify_outputs.json straight into the frontend folder (public/).
        - cd amplify-backend && npm ci && npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --outputs-out-dir ../public
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # No frontend build step needed — it's static. The backend phase already wrote
        # public/amplify_outputs.json (via --outputs-out-dir ../public) for the app to use.
        - echo "Static frontend — using public/amplify_outputs.json from the backend phase"
  artifacts:
    baseDirectory: /public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

