<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amplify UMD Test</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- AWS Amplify UMD Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/aws-amplify@6/dist/aws-amplify.min.js"></script>
  
  <!-- Amplify Helper Scripts (UMD) -->
  <script type="text/javascript" src="./js/amplify-init-umd.js?v=202606271646"></script>
  <script type="text/javascript" src="./js/amplify-auth-umd.js?v=202606271646"></script>
  <script type="text/javascript" src="./js/amplify-data-umd.js?v=202606271646"></script>
  <script type="text/javascript" src="./js/amplify-storage-umd.js?v=202606271646"></script>
  
  <style>
    .test-section {
      margin: 20px 0;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .success { color: green; }
    .error { color: red; }
    .info { color: blue; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1>AWS Amplify UMD Test Page</h1>
    <p class="text-muted">This page tests if Amplify UMD bundle loads correctly</p>
    
    <div class="test-section">
      <h3>1. Amplify Bundle Check</h3>
      <div id="bundle-check"></div>
    </div>
    
    <div class="test-section">
      <h3>2. Amplify Configuration Check</h3>
      <div id="config-check"></div>
    </div>
    
    <div class="test-section">
      <h3>3. Helper Functions Check</h3>
      <div id="helpers-check"></div>
    </div>
    
    <div class="test-section">
      <h3>4. Test Data Query</h3>
      <button class="btn btn-primary" onclick="testDataQuery()">Test Get All Cohorts</button>
      <div id="data-test" class="mt-3"></div>
    </div>
    
    <div class="test-section">
      <h3>5. Console Logs</h3>
      <p class="info">Check browser console (F12) for detailed logs</p>
    </div>
  </div>
  
  <script>
    // Wait for page to load
    window.addEventListener('load', function() {
      setTimeout(runTests, 1000); // Give Amplify time to initialize
    });
    
    function runTests() {
      // Test 1: Check if Amplify bundle loaded
      const bundleCheck = document.getElementById('bundle-check');
      if (window.aws_amplify) {
        bundleCheck.innerHTML = '<p class="success">✅ Amplify UMD bundle loaded successfully</p>';
        bundleCheck.innerHTML += '<p class="info">Available: aws_amplify.Amplify, aws_amplify.Auth, aws_amplify.Data, aws_amplify.Storage</p>';
      } else {
        bundleCheck.innerHTML = '<p class="error">❌ Amplify UMD bundle NOT loaded</p>';
      }
      
      // Test 2: Check if Amplify is configured
      const configCheck = document.getElementById('config-check');
      if (window.AmplifyAuth && window.AmplifyData && window.AmplifyStorage) {
        configCheck.innerHTML = '<p class="success">✅ Amplify configured and modules available</p>';
        configCheck.innerHTML += '<p class="info">Global objects: AmplifyAuth, AmplifyData, AmplifyStorage</p>';
      } else {
        configCheck.innerHTML = '<p class="error">❌ Amplify NOT configured yet (may still be loading)</p>';
      }
      
      // Test 3: Check if helper functions loaded
      const helpersCheck = document.getElementById('helpers-check');
      if (window.amplifyAuth && window.amplifyData && window.amplifyStorage) {
        helpersCheck.innerHTML = '<p class="success">✅ All helper functions loaded</p>';
        helpersCheck.innerHTML += '<p class="info">Available: window.amplifyAuth, window.amplifyData, window.amplifyStorage</p>';
        
        // List some functions
        helpersCheck.innerHTML += '<p class="info">Auth functions: ' + Object.keys(window.amplifyAuth).join(', ') + '</p>';
        helpersCheck.innerHTML += '<p class="info">Data functions: ' + Object.keys(window.amplifyData).slice(0, 5).join(', ') + '...</p>';
        helpersCheck.innerHTML += '<p class="info">Storage functions: ' + Object.keys(window.amplifyStorage).join(', ') + '</p>';
      } else {
        helpersCheck.innerHTML = '<p class="error">❌ Helper functions NOT loaded</p>';
      }
    }
    
    // Test 4: Try to query data
    async function testDataQuery() {
      const resultDiv = document.getElementById('data-test');
      resultDiv.innerHTML = '<p class="info">Testing data query...</p>';
      
      try {
        if (!window.amplifyData) {
          throw new Error('amplifyData not available');
        }
        
        const cohorts = await window.amplifyData.getAllCohorts();
        
        if (cohorts && cohorts.length > 0) {
          resultDiv.innerHTML = '<p class="success">✅ Data query successful!</p>';
          resultDiv.innerHTML += '<p class="info">Found ' + cohorts.length + ' cohort(s)</p>';
          resultDiv.innerHTML += '<pre>' + JSON.stringify(cohorts, null, 2) + '</pre>';
        } else {
          resultDiv.innerHTML = '<p class="success">✅ Query successful but no cohorts found</p>';
          resultDiv.innerHTML += '<p class="info">This is normal if you haven\'t created any cohorts yet</p>';
        }
      } catch (error) {
        resultDiv.innerHTML = '<p class="error">❌ Data query failed</p>';
        resultDiv.innerHTML += '<p class="error">Error: ' + error.message + '</p>';
        console.error('Data query error:', error);
      }
    }
  </script>
</body>
</html>
