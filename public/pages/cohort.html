    }

    }

    .dynamic-link {
      cursor: pointer;
    }

    .card-body img {

      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 150px;
    }
  </style>

</head>

<body>
  <div class="page-body">
    <nav class="navbar navbar-expand-lg bg-light">
      <div class="container-fluid g-0">
        <a onclick="createPath('index.html')" class="navbar-brand" href="#" style="
              border-right: 2px solid #d9437a;
              padding-right: 10px;
              color: #1d0c59;
            ">
          <img src="../images/logo.png" height="60px" alt="CTF logo" />
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-between" id="navbarNavAltMarkup">
          <div class="navbar-nav nav-justified">
            <a class="nav-link" href="#" onclick="createPath('index.html')">About CTF</a>
            <a class="nav-link" href="#" onclick="createPath('pages/meetTheTutors.html')">Meet the tutors</a>
            <a class="nav-link" href="#" onclick="createPath('pages/1on1.html')">Schedule a 1:1</a>
            <a class="nav-link" href="#" id="jobs-nav-link" onclick="createPath('pages/jobs.html')">Jobs at IBM</a>
            <a class="nav-link" href="#" onclick="createPath('pages/courseCatalog.html')">Course Catalog</a>
            <a class="nav-link" href="#" onclick="createPath('pages/sessions.html')" id="sessionsLink">Sessions</a>
          </div>
          <div class="d-flex align-items-center" div id="profile-button">
            <!-- Logged in Avatar -->
            <div>
              <p class=" my-auto" id="profileName">
              </p>
            </div>
            <div class="profileBtn dropdown px-3">
              <a class="btn dropdown-toggle" href="#" role="button" id="dropdownMenuLink" data-bs-toggle="dropdown"
                aria-expanded="false">
                <img id="profile-pic-avatar" class="rounded-circle" height="25" alt=""
                  src="../images/blank_avatar.jpg"
                  loading="lazy" />
              </a>

              <ul class="dropdown-menu dropdown-menu-end" aria-labelledby=" dropdownMenuLink">
                <li>
                  <a class="dropdown-item" href="#" onclick="createPath('pages/profile.html')">My Profile</a>
                </li>
                <li>
                  <a class="dropdown-item" href="#" onclick="createPath('pages/cohort.html')">My Cohort</a>
                </li>
                <li id="teacher-menu-item" style="display: none;"><a class="dropdown-item" href="#"
                    onclick="createPath('pages/teacherCohortView.html')">View All Cohorts</a></li>
                <li id="tutor-menu-item" style="display: none;"><a class="dropdown-item" href="#"
                    onclick="createPath('pages/tutorAvailability.html')">Tutor Availability</a></li>
                <li id="admin-menu-item" style="display: none;"><a class="dropdown-item" href="#"
                    onclick="createPath('pages/adminCohortView.html')">All Cohorts (Admin)</a></li>

                  <a class="dropdown-item" href="#" onclick="logUserOut()">Log out</a>

              </ul>

    <div class="container-fluid page-content">
      <h1 class="text-center pt-4">Meet your Cohort</h1>
      <div class="row card-container">
        <!-- cohort cards here -->
      </div>
    </div>
  </div>

  <script type="text/javascript">

    const itemsPerPage = 8;
    let currentPage = 1;
    let cohortMembers = [];

    window.onload = async (event) => {
      auth(
        null,
        document.querySelector(".profileBtn"),
        document.querySelector("#sessionsLink")
      );

      // Load cohort data using localStorage
      if (localStorage.getItem('loggedIn') === 'true') {
        const isTeacher = localStorage.getItem('isTeacher') === 'true';
        const schoolPrefix = (localStorage.getItem('schoolPrefix') || '').trim();
        const cohortCode = localStorage.getItem('cohort');

        // Teachers see every student across their school's cohorts (by prefix);
        // everyone else sees their own cohort.
        let students = [];
        if (isTeacher && schoolPrefix) {
          students = await window.getStudentsBySchoolPrefix(schoolPrefix);
        } else if (cohortCode) {
          students = await window.getStudentsByCohort(cohortCode);
        }

        await loadCohortData(students);

        const elements = document.getElementsByClassName("dynamic-link");
        for (let i = 0; i < elements.length; i++) {
          elements[i].addEventListener('click', (e) => redirect(e.target.name, e.target.id), false);
        }
      }
    };

    async function loadCohortData(students) {
      cohortMembers = [];
      const currentEmail = localStorage.getItem('userEmail');

      cohortMembers = students.map(s => {
        let profile = {};
        if (s.profile) {
          try {
            profile = typeof s.profile === 'string' ? JSON.parse(s.profile) : s.profile;
          } catch (e) {
            console.error('Error parsing profile for', s.email, e);
          }
        }
        return {
          id: s.id,
          email: s.email,
          displayName: s.displayName,
          cohort: s.cohortId,
          profile,
          isCurrentUser: s.email === currentEmail
        };
      });

      // Ensure current user appears first
      cohortMembers.sort((a, b) => b.isCurrentUser - a.isCurrentUser);

      if (cohortMembers.length === 0) {
        showEmptyState();
        return;
      }

      loadCohortPage(1);
      renderPaginationControls();
    }

    function showEmptyState() {
      const cardContainer = document.querySelector(".card-container");
      cardContainer.innerHTML = `
        <div class="col-12 text-center py-5">
          <h3 class="text-muted mb-3">No one else has joined your cohort yet</h3>
          <p class="text-muted mb-4">In the meantime, make sure your profile is up to date so your cohort can get to know you when they arrive!</p>
          <a href="javascript:void(0);" onclick="createPath('pages/profile.html')" class="btn text-white" style="background-color: #31268c;">
            Update your profile
          </a>
        </div>
      `;
    }

    function loadCohortPage(page) {
      const cardContainer = document.querySelector(".card-container");
      cardContainer.innerHTML = "";
      currentPage = page;

      if (cohortMembers.length === 1 && cohortMembers[0].isCurrentUser) {
        cardContainer.innerHTML = `
          <div class="col-12 text-center py-4">
            <p class="text-muted">You're the first one here! Your cohort members will appear below as they join.</p>
          </div>
        `;
      }

      const start = (page - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageMembers = cohortMembers.slice(start, end);

      pageMembers.forEach(({ id, email, displayName, profile, isCurrentUser }) => {
        const youBadge = isCurrentUser ? ' <span class="badge bg-secondary">You</span>' : '';
        const cardHTML = `
          <div class="col-lg-3 col-md-4 col-sm-6 col-12">
            <div class="card shadow m-2" style="height: fit-content">
              <div class="card-body">
                <p class="h5 text-center" style="padding-top:0;">${displayName}${youBadge}</p>
                <div class="d-flex justify-content-center">
                  <img class="rounded-circle avatar-dimensions img-thumbnail" src="../images/blank_avatar.jpg"
                    alt="Profile picture of ${displayName}" data-user-id="${id}" />
                </div>
                <div class="text-center mt-4">
                  <a href="javascript:void(0);" data-name="${displayName}" data-id="${id}" ${isCurrentUser ? 'data-self="true"' : ''} class="dynamic-link" title="View profile">${isCurrentUser ? 'Edit your profile' : 'View profile'}</a>
                </div>
              </div>
            </div>
          </div>
        `;
        cardContainer.insertAdjacentHTML('beforeend', cardHTML);
        setUserProfileImage(id);
      });

      document.querySelectorAll(".dynamic-link").forEach(link => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          const target = e.target;
          if (target.getAttribute("data-self") === "true") {
            createPath('pages/profile.html');
            return;
          }
          const name = target.getAttribute("data-name");
          const id = target.getAttribute("data-id");
          redirect(name, id);
        });
      });

      renderPaginationControls();
    }

    function renderPaginationControls() {
      const paginationContainer = document.createElement("div");
      paginationContainer.className = "pagination-container text-center mt-4";

      const totalPages = Math.ceil(cohortMembers.length / itemsPerPage);
      for (let i = 1; i <= totalPages; i++) {
        const pageButton = document.createElement("button");
        pageButton.className = "btn btn-outline-secondary mx-1";
        pageButton.textContent = i;

        if (i === currentPage) {
          pageButton.classList.add("active");
        }

        pageButton.onclick = () => {
          currentPage = i;
          loadCohortPage(i);
        };

        paginationContainer.appendChild(pageButton);
      }

      document.querySelector(".pagination-container")?.remove();
      document.querySelector(".container-fluid.page-content").appendChild(paginationContainer);
    }

    async function setUserProfileImage(userId) {
      const imgElement = document.querySelector(`img[data-user-id="${userId}"]`);
      if (!imgElement) return;

      try {
        const url = await window.profilePictures.getProfilePictureUrl(userId);
        if (url) imgElement.src = url;
      } catch (error) {
        console.error(`Error fetching profile image for ${userId}:`, error);
      }
    }


    function createPath(options) {
      window.location = getPath() + options;
    }

    function redirect(name, id) {
      if (!name || !id) {
        console.error("Redirect error: Missing name or id", { name, id });
        return;
      }

      const url = `${getPath()}pages/cohort/member.html?name=${encodeURIComponent(name)}&id=${encodeURIComponent(id)}`;
      window.location.href = url;
    }

    function logUserOut(event) {
      logout();
    }
  </script>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
