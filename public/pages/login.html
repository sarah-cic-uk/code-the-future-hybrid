<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code the Future - Login</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/mainStyle.css">
  
  <!-- AWS SDK for Cognito -->
  <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1544.0.min.js"></script>
  <script src="./js/s3-profile-pictures.js"></script>
  
  <style>
    .auth-container {
      max-width: 500px;
      margin: 50px auto;
      padding: 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border-radius: 8px;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .nav-tabs { margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="auth-container">
      <div class="text-center mb-4">
        <img src="../images/logo.png" alt="Code the Future" style="max-width: 200px;">
        <h2 class="mt-3">Welcome</h2>
      </div>
      
      <ul class="nav nav-tabs" role="tablist">
        <li class="nav-item">
          <a class="nav-link active" data-tab="login" onclick="showTab('login')">Sign In</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-tab="register" onclick="showTab('register')">Register</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-tab="verify" onclick="showTab('verify')">Verify Email</a>
        </li>
      </ul>
      
      <!-- Login Tab -->
      <div id="login-tab" class="tab-content active">
        <form onsubmit="handleLogin(event)">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="login-email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="login-password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
        <div id="login-message" class="mt-3"></div>
      </div>
      
      <!-- Register Tab -->
      <div id="register-tab" class="tab-content">
        <form onsubmit="handleRegister(event)">
          <div class="mb-3">
            <label class="form-label">Cohort Code</label>
            <input type="text" class="form-control" id="reg-cohort" required placeholder="e.g., TEST2024">
            <small class="text-muted">Get this from your coordinator</small>
          </div>
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="reg-name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="reg-email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="reg-password" required minlength="8">
            <small class="text-muted">Minimum 8 characters</small>
          </div>
          <button type="submit" class="btn btn-primary w-100">Create Account</button>
        </form>
        <div id="register-message" class="mt-3"></div>
      </div>

      <!-- Verify Email Tab -->
      <div id="verify-tab" class="tab-content">
        <p class="text-muted">Enter the 6-digit code sent to your email to activate your account.</p>
        <form onsubmit="handleVerify(event)">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="verify-email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Verification Code</label>
            <input type="text" class="form-control" id="verify-code" required placeholder="6-digit code"
              inputmode="numeric" autocomplete="one-time-code">
          </div>
          <button type="submit" class="btn btn-primary w-100">Verify Email</button>
        </form>
        <div class="text-center mt-2">
          <a href="#" onclick="handleResendCode(event)" class="small">Resend code</a>
        </div>
        <div id="verify-message" class="mt-3"></div>
      </div>
    </div>
  </div>

  <script>
    let config = null;
    let cognitoIdentityServiceProvider = null;
    
    // Load configuration
    fetch('/amplify_outputs.json')
      .then(r => r.json())
      .then(data => {
        config = data;
        AWS.config.region = config.auth.aws_region;
        cognitoIdentityServiceProvider = new AWS.CognitoIdentityServiceProvider({
          region: config.auth.aws_region
        });
        console.log('✅ AWS SDK configured');
      })
      .catch(err => {
        console.error('Failed to load config:', err);
        alert('Failed to load configuration. Please refresh.');
      });
    
    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      document.getElementById(tab + '-tab').classList.add('active');
      const navLink = document.querySelector(`.nav-link[data-tab="${tab}"]`);
      if (navLink) navLink.classList.add('active');
    }
    
    function showMessage(elementId, message, isError = false) {
      const el = document.getElementById(elementId);
      el.innerHTML = `<div class="alert alert-${isError ? 'danger' : 'success'}">${message}</div>`;
    }
    
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      try {
        const params = {
          AuthFlow: 'USER_PASSWORD_AUTH',
          ClientId: config.auth.user_pool_client_id,
          AuthParameters: {
            USERNAME: email,
            PASSWORD: password
          }
        };
        
        const result = await cognitoIdentityServiceProvider.initiateAuth(params).promise();
        
        if (result.AuthenticationResult) {
          const getUserParams = {
            AccessToken: result.AuthenticationResult.AccessToken
          };

          const userInfo = await cognitoIdentityServiceProvider.getUser(getUserParams).promise();
          const nameAttr = userInfo.UserAttributes.find(attr => attr.Name === 'name');
          const displayName = nameAttr ? nameAttr.Value : email.split('@')[0];

          sessionStorage.clear();

          localStorage.setItem('accessToken', result.AuthenticationResult.AccessToken);
          localStorage.setItem('idToken', result.AuthenticationResult.IdToken);
          localStorage.setItem('refreshToken', result.AuthenticationResult.RefreshToken);
          localStorage.setItem('loggedIn', 'true');
          localStorage.setItem('userEmail', email);
          localStorage.setItem('displayName', displayName);

          // Fetch user record from DynamoDB for cohort, userId and teacher status
          try {
            const userQuery = `
              query ListUsers($email: String!) {
                listUsers(filter: { email: { eq: $email } }) {
                  items { id cohortId isTeacher isTutor schoolPrefix }
                }
              }
            `;
            const userData = await executeGraphQL(userQuery, { email });
            const user = userData.listUsers.items[0];
            if (user) {
              localStorage.setItem('userId', user.id);
              if (user.cohortId) localStorage.setItem('cohort', user.cohortId);
              localStorage.setItem('isTeacher', user.isTeacher ? 'true' : 'false');
              localStorage.setItem('isTutor', user.isTutor ? 'true' : 'false');
              localStorage.setItem('schoolPrefix', user.schoolPrefix || '');

              // Pre-cache the nav-bar avatar so it shows on every page right after login
              try {
                if (window.profilePictures) {
                  const picUrl = await window.profilePictures.getProfilePictureUrl(user.id);
                  if (picUrl) window.profilePictures.cacheNavAvatar(picUrl);
                }
              } catch (picErr) {
                console.error('Error caching avatar at login:', picErr);
              }
            }
          } catch (e) {
            console.error('Error fetching user record:', e);
          }

          window.location.href = './sessions.html';
        }
      } catch (error) {
        console.error('Login error:', error);
        showMessage('login-message', error.message || 'Login failed', true);
      }
    }
    
    async function executeGraphQL(query, variables = {}) {
      const response = await fetch(config.data.url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': config.data.api_key
        },
        body: JSON.stringify({ query, variables })
      });
      const result = await response.json();
      if (result.errors) throw new Error(result.errors[0].message);
      return result.data;
    }

    async function validateCohortCode(cohortCode) {
      const query = `
        query ListCohorts($code: String!) {
          listCohorts(filter: { cohortCode: { eq: $code } }) {
            items { id cohortCode name }
          }
        }
      `;
      const data = await executeGraphQL(query, { code: cohortCode });
      return data.listCohorts.items.length > 0 ? data.listCohorts.items[0] : null;
    }

    // Teacher codes are {schoolPrefix}Tutor, e.g. "peverillTutor".
    // Returns the lowercased school prefix, or null if not a teacher code.
    function deriveTeacherPrefix(code) {
      const match = code.match(/^(.+?)Tutor$/i);
      return match ? match[1].toLowerCase() : null;
    }

    // A teacher prefix is valid if at least one cohort code starts with it.
    async function validateTeacherPrefix(prefix) {
      const query = `
        query ListCohorts {
          listCohorts { items { cohortCode } }
        }
      `;
      const data = await executeGraphQL(query);
      return data.listCohorts.items.some(c =>
        (c.cohortCode || '').toLowerCase().startsWith(prefix)
      );
    }

    // Fixed code that grants course-owner (admin) access.
    const TUTOR_CODE = 'Cod3Th3Futur3Tutor!';

    async function createUserRecord(email, displayName, { cohortId = null, isTeacher = false, isTutor = false, schoolPrefix = null } = {}) {
      const query = `
        mutation CreateUser($input: CreateUserInput!) {
          createUser(input: $input) {
            id email displayName cohortId isTeacher isTutor schoolPrefix
          }
        }
      `;
      const data = await executeGraphQL(query, {
        input: { email, displayName, cohortId, isTeacher, isTutor, schoolPrefix }
      });
      return data.createUser;
    }

    async function handleRegister(e) {
      e.preventDefault();
      const cohort = document.getElementById('reg-cohort').value.trim();
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;

      try {
        if (!cohort || cohort.length < 3) {
          throw new Error('Please enter a valid cohort or teacher code');
        }

        // Determine the role from the code:
        //   tutor code (fixed) -> course owner/admin
        //   {schoolPrefix}Tutor -> teacher
        //   anything else -> student cohort code
        const teacherPrefix = deriveTeacherPrefix(cohort);
        let userFields;

        if (cohort === TUTOR_CODE) {
          userFields = { isTutor: true };
        } else if (teacherPrefix) {
          const prefixValid = await validateTeacherPrefix(teacherPrefix);
          if (!prefixValid) {
            throw new Error('Teacher code not recognised. No cohorts found for your school.');
          }
          userFields = { isTeacher: true, schoolPrefix: teacherPrefix };
        } else {
          const cohortRecord = await validateCohortCode(cohort);
          if (!cohortRecord) {
            throw new Error('Cohort code not found. Please check with your teacher.');
          }
          userFields = { cohortId: cohort };
        }

        const params = {
          ClientId: config.auth.user_pool_client_id,
          Username: email,
          Password: password,
          UserAttributes: [
            { Name: 'email', Value: email },
            { Name: 'name', Value: name }
          ]
        };

        await cognitoIdentityServiceProvider.signUp(params).promise();

        await createUserRecord(email, name, userFields);

        // Move the user to the verification step with their email prefilled
        document.getElementById('verify-email').value = email;
        showTab('verify');
        showMessage('verify-message',
          'Account created! Enter the 6-digit code sent to ' + email + ' to activate your account.');

        document.getElementById('reg-cohort').value = '';
        document.getElementById('reg-name').value = '';
        document.getElementById('reg-email').value = '';
        document.getElementById('reg-password').value = '';

      } catch (error) {
        console.error('Registration error:', error);
        showMessage('register-message', error.message || 'Registration failed', true);
      }
    }

    async function handleVerify(e) {
      e.preventDefault();
      const email = document.getElementById('verify-email').value.trim();
      const code = document.getElementById('verify-code').value.trim();

      try {
        await cognitoIdentityServiceProvider.confirmSignUp({
          ClientId: config.auth.user_pool_client_id,
          Username: email,
          ConfirmationCode: code
        }).promise();

        showMessage('verify-message', 'Email verified! You can now sign in.');
        document.getElementById('login-email').value = email;
        setTimeout(() => showTab('login'), 1500);
      } catch (error) {
        console.error('Verification error:', error);
        showMessage('verify-message', error.message || 'Verification failed', true);
      }
    }

    async function handleResendCode(e) {
      e.preventDefault();
      const email = document.getElementById('verify-email').value.trim();
      if (!email) {
        showMessage('verify-message', 'Enter your email first, then click resend.', true);
        return;
      }

      try {
        await cognitoIdentityServiceProvider.resendConfirmationCode({
          ClientId: config.auth.user_pool_client_id,
          Username: email
        }).promise();
        showMessage('verify-message', 'A new code has been sent to ' + email + '.');
      } catch (error) {
        console.error('Resend error:', error);
        showMessage('verify-message', error.message || 'Could not resend code', true);
      }
    }
  </script>
</body>
</html>
