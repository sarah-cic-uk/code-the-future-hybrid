<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code the Future - Login</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/mainStyle.css">
  
  <!-- AWS SDK for Cognito -->
  <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1544.0.min.js"></script>
  
  <style>
    .auth-container {
      max-width: 500px;
      margin: 50px auto;
      padding: 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border-radius: 8px;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .nav-tabs { margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="auth-container">
      <div class="text-center mb-4">
        <img src="../images/logo.png" alt="Code the Future" style="max-width: 200px;">
        <h2 class="mt-3">Welcome</h2>
      </div>
      
      <ul class="nav nav-tabs" role="tablist">
        <li class="nav-item">
          <a class="nav-link active" onclick="showTab('login')">Sign In</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" onclick="showTab('register')">Register</a>
        </li>
      </ul>
      
      <!-- Login Tab -->
      <div id="login-tab" class="tab-content active">
        <form onsubmit="handleLogin(event)">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="login-email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="login-password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
        <div id="login-message" class="mt-3"></div>
      </div>
      
      <!-- Register Tab -->
      <div id="register-tab" class="tab-content">
        <form onsubmit="handleRegister(event)">
          <div class="mb-3">
            <label class="form-label">Cohort Code</label>
            <input type="text" class="form-control" id="reg-cohort" required placeholder="e.g., TEST2024">
            <small class="text-muted">Get this from your coordinator</small>
          </div>
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="reg-name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="reg-email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="reg-password" required minlength="8">
            <small class="text-muted">Minimum 8 characters</small>
          </div>
          <button type="submit" class="btn btn-primary w-100">Create Account</button>
        </form>
        <div id="register-message" class="mt-3"></div>
      </div>
    </div>
  </div>

  <script>
    let config = null;
    let cognitoIdentityServiceProvider = null;
    
    // Load configuration
    fetch('/amplify_outputs.json')
      .then(r => r.json())
      .then(data => {
        config = data;
        AWS.config.region = config.auth.aws_region;
        cognitoIdentityServiceProvider = new AWS.CognitoIdentityServiceProvider({
          region: config.auth.aws_region
        });
        console.log('✅ AWS SDK configured');
      })
      .catch(err => {
        console.error('Failed to load config:', err);
        alert('Failed to load configuration. Please refresh.');
      });
    
    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      document.getElementById(tab + '-tab').classList.add('active');
      event.target.classList.add('active');
    }
    
    function showMessage(elementId, message, isError = false) {
      const el = document.getElementById(elementId);
      el.innerHTML = `<div class="alert alert-${isError ? 'danger' : 'success'}">${message}</div>`;
    }
    
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      try {
        const params = {
          AuthFlow: 'USER_PASSWORD_AUTH',
          ClientId: config.auth.user_pool_client_id,
          AuthParameters: {
            USERNAME: email,
            PASSWORD: password
          }
        };
        
        const result = await cognitoIdentityServiceProvider.initiateAuth(params).promise();
        
        if (result.AuthenticationResult) {
          // Store tokens
          localStorage.setItem('accessToken', result.AuthenticationResult.AccessToken);
          localStorage.setItem('idToken', result.AuthenticationResult.IdToken);
          localStorage.setItem('loggedIn', 'true');
          localStorage.setItem('userEmail', email);
          
          // Redirect
          window.location.href = './sessions.html';
        }
      } catch (error) {
        console.error('Login error:', error);
        showMessage('login-message', error.message || 'Login failed', true);
      }
    }
    
    async function handleRegister(e) {
      e.preventDefault();
      const cohort = document.getElementById('reg-cohort').value;
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      
      try {
        // Validate cohort (simplified - just check it's not empty)
        if (!cohort || cohort.length < 3) {
          throw new Error('Please enter a valid cohort code');
        }
        
        const params = {
          ClientId: config.auth.user_pool_client_id,
          Username: email,
          Password: password,
          UserAttributes: [
            { Name: 'email', Value: email },
            { Name: 'name', Value: name }
          ]
        };
        
        const result = await cognitoIdentityServiceProvider.signUp(params).promise();
        
        showMessage('register-message', 
          'Account created! Please check your email for a verification code. ' +
          'After verifying, you can sign in using the Sign In tab.');
        
        // Clear form
        document.getElementById('reg-cohort').value = '';
        document.getElementById('reg-name').value = '';
        document.getElementById('reg-email').value = '';
        document.getElementById('reg-password').value = '';
        
      } catch (error) {
        console.error('Registration error:', error);
        showMessage('register-message', error.message || 'Registration failed', true);
      }
    }
  </script>
</body>
</html>
