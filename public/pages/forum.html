  <style>
    .forum-tabs .nav-link {
      font-size: 0.85rem;
      padding: 0.4rem 0.85rem;
      color: #495057;
    }

    .forum-tabs .nav-link.active {
      color: #31268c;
      font-weight: 600;
      border-bottom-color: #31268c;
    }

    .post-card {
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.85rem;
      background: #fff;
      transition: box-shadow 0.15s;
    }

    .post-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .post-card-title {
      font-weight: 700;
      font-size: 0.975rem;
      color: #1d0c59;
      margin-bottom: 0.15rem;
    }

    .post-card-meta {
      font-size: 0.78rem;
      color: #6c757d;
      margin-bottom: 0.5rem;
    }

    .post-card-body-text {
      font-size: 0.875rem;
      color: #343a40;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 0.65rem;
    }

    .post-card-body-text.expanded {
      display: block;
      -webkit-line-clamp: unset;
    }

    .section-badge {
      font-size: 0.7rem;
      background: #ede9f8;
      color: #31268c;
      padding: 0.1rem 0.5rem;
      border-radius: 999px;
      font-weight: 600;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    .answers-panel {
      margin-top: 0.9rem;
      padding-top: 0.9rem;
      border-top: 1px solid #dee2e6;
    }

    .answer-item {
      padding: 0.65rem 0.9rem;
      background: #f8f9fa;
      border-radius: 6px;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
    }

    .answer-item-meta {
      font-size: 0.75rem;
      color: #6c757d;
      margin-bottom: 0.25rem;
    }

    .answer-form textarea {
      font-size: 0.875rem;
      resize: vertical;
      min-height: 70px;
    }

    .btn-forum-primary {
      background-color: #31268c;
      color: #fff;
      border: none;
    }

    .btn-forum-primary:hover,
    .btn-forum-primary:focus {
      background-color: #26207a;
      color: #fff;
    }

    .btn-delete {
      color: #dc3545;
      background: none;
      border: none;
      padding: 0;
      font-size: 0.8rem;
      cursor: pointer;
      opacity: 0.55;
      line-height: 1;
    }

    .btn-delete:hover {
      opacity: 1;
    }

    .forum-empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #6c757d;
    }

    .forum-empty i {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .forum-search .input-group {
      max-width: 380px;
    }
  </style>

  <script type="text/javascript">
    // ── Constants ────────────────────────────────────────────────────────────────

    const FORUM_SECTIONS = [
      { key: 'session1',    label: 'Session 1' },
      { key: 'session2',    label: 'Session 2' },
      { key: 'session3',    label: 'Session 3' },
      { key: 'session4',    label: 'Session 4' },
      { key: 'session5',    label: 'Session 5' },
      { key: 'aiSession',   label: 'AI Session' },
      { key: 'careersTech', label: 'Careers in Tech' },
      { key: 'lifeAtIBM',   label: 'Life at IBM' },
    ];

    const SECTION_MAP = {};
    FORUM_SECTIONS.forEach(s => { SECTION_MAP[s.key] = s.label; });

    let activeSection = (window.location.hash.slice(1) || 'session1');
    if (!SECTION_MAP[activeSection]) activeSection = 'session1';

    let _apiConfig = null;
    let _searchCache = null;
    let _searchDebounce = null;

    const isStaff = () =>
      localStorage.getItem('isTutor') === 'true' ||
      localStorage.getItem('isAdmin') === 'true';

    // ── Config / GraphQL ─────────────────────────────────────────────────────────

    async function getConfig() {
      if (_apiConfig) return _apiConfig;
      const res = await fetch('/amplify_outputs.json');
      _apiConfig = await res.json();
      return _apiConfig;
    }

    async function gql(query, variables) {
      const config = await getConfig();
      const res = await fetch(config.data.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': config.data.api_key },
        body: JSON.stringify({ query, variables }),
      });
      return res.json();
    }

    async function listAll(query, variables) {
      let items = [];
      let nextToken = null;
      do {
        const json = await gql(query, { ...variables, nextToken });
        const data = Object.values(json.data)[0];
        items = items.concat(data.items || []);
        nextToken = data.nextToken;
      } while (nextToken);
      return items;
    }

    // ── Queries ──────────────────────────────────────────────────────────────────

    const LIST_POSTS_BY_SECTION = `
      query ListPosts($section: String!, $nextToken: String) {
        listForumPosts(filter: { section: { eq: $section } }, nextToken: $nextToken) {
          items { id section title body authorName createdAt }
          nextToken
        }
      }
    `;

    const LIST_ALL_POSTS = `
      query ListAllPosts($nextToken: String) {
        listForumPosts(nextToken: $nextToken) {
          items { id section title body authorName createdAt }
          nextToken
        }
      }
    `;

    const CREATE_POST = `
      mutation CreatePost($input: CreateForumPostInput!) {
        createForumPost(input: $input) { id }
      }
    `;

    const DELETE_POST = `
      mutation DeletePost($id: ID!) {
        deleteForumPost(input: { id: $id }) { id }
      }
    `;

    const LIST_ANSWERS = `
      query ListAnswers($postId: String!, $nextToken: String) {
        listForumAnswers(filter: { postId: { eq: $postId } }, nextToken: $nextToken) {
          items { id postId body authorName createdAt }
          nextToken
        }
      }
    `;

    const CREATE_ANSWER = `
      mutation CreateAnswer($input: CreateForumAnswerInput!) {
        createForumAnswer(input: $input) { id }
      }
    `;

    const DELETE_ANSWER = `
      mutation DeleteAnswer($id: ID!) {
        deleteForumAnswer(input: { id: $id }) { id }
      }
    `;

    // ── Helpers ──────────────────────────────────────────────────────────────────

    function escHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function relativeTime(iso) {
      const ms = Date.now() - new Date(iso).getTime();
      const s = Math.floor(ms / 1000);
      if (s < 60) return 'just now';
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      const d = Math.floor(h / 24);
      if (d < 30) return `${d}d ago`;
      return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // ── Sidebar highlight ─────────────────────────────────────────────────────────

    function updateForumNav(sectionKey) {
      // Expand the Forum submenu
      const submenu = document.getElementById('submenuForum');
      if (submenu) submenu.classList.add('show');

      // Highlight the "Forum" top-level button
      const forumBtn = document.querySelector('button[name="forum"]');
      if (forumBtn) forumBtn.classList.add('active-side-nav');

      // Highlight the active section sub-link
      document.querySelectorAll('[name^="forum-"]').forEach(el => el.classList.remove('active-side-nav'));
      const activeLink = document.querySelector(`[name="forum-${sectionKey}"]`);
      if (activeLink) activeLink.classList.add('active-side-nav');
    }

    // ── Tabs ─────────────────────────────────────────────────────────────────────

    function buildTabs() {
      const ul = document.getElementById('forum-tabs');
      FORUM_SECTIONS.forEach(s => {
        const li = document.createElement('li');
        li.className = 'nav-item';
        const btn = document.createElement('button');
        btn.className = 'nav-link' + (s.key === activeSection ? ' active' : '');
        btn.dataset.section = s.key;
        btn.textContent = s.label;
        btn.addEventListener('click', () => {
          history.replaceState(null, '', '#' + s.key);
          activateSection(s.key);
        });
        li.appendChild(btn);
        ul.appendChild(li);
      });
    }

    function setActiveTab(sectionKey) {
      document.querySelectorAll('#forum-tabs .nav-link').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.section === sectionKey);
      });
      // Pre-select the matching section in the ask modal dropdown
      const select = document.getElementById('ask-section');
      if (select && sectionKey) select.value = sectionKey;
    }

    // ── Section loading ──────────────────────────────────────────────────────────

    async function activateSection(sectionKey) {
      activeSection = sectionKey;
      setActiveTab(sectionKey);
      updateForumNav(sectionKey);
      _searchCache = null;

      // Clear search if switching sections
      const searchInput = document.getElementById('forum-search');
      if (searchInput && searchInput.value) {
        searchInput.value = '';
        document.getElementById('forum-search-clear').style.display = 'none';
      }

      document.getElementById('forum-content').innerHTML = `
        <div class="text-center py-5 text-muted">
          <div class="spinner-border spinner-border-sm" role="status"></div>
          <span class="ms-2">Loading…</span>
        </div>`;

      try {
        const posts = await listAll(LIST_POSTS_BY_SECTION, { section: sectionKey });
        posts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        renderPostList(posts, false);
      } catch (err) {
        console.error(err);
        document.getElementById('forum-content').innerHTML =
          '<div class="alert alert-danger mt-2">Failed to load posts. Please refresh the page.</div>';
      }
    }

    // ── Render posts ─────────────────────────────────────────────────────────────

    function renderPostList(posts, showSectionBadge) {
      const container = document.getElementById('forum-content');
      if (!posts.length) {
        container.innerHTML = `
          <div class="forum-empty">
            <i class="bi bi-chat-square-text"></i>
            <p class="fw-semibold mb-1">No questions here yet</p>
            <p class="small">Be the first to ask one!</p>
          </div>`;
        return;
      }

      container.innerHTML = '';
      posts.forEach(post => {
        const card = document.createElement('div');
        card.className = 'post-card';

        const badge = showSectionBadge && SECTION_MAP[post.section]
          ? `<span class="section-badge">${SECTION_MAP[post.section]}</span>` : '';

        card.innerHTML = `
          <div class="d-flex align-items-start justify-content-between gap-2">
            <div class="post-card-title">${escHtml(post.title)}${badge}</div>
          </div>
          <div class="post-card-meta">${escHtml(post.authorName || 'Anonymous')} &middot; ${relativeTime(post.createdAt)}</div>
          <div class="post-card-body-text">${escHtml(post.body)}</div>
          <div class="post-card-actions d-flex align-items-center gap-2">
            <button class="btn btn-sm btn-outline-secondary toggle-btn">
              View discussion <i class="bi bi-chevron-down ms-1"></i>
            </button>
          </div>
          <div class="answers-panel" style="display:none;"></div>
        `;

        if (isStaff()) {
          const del = document.createElement('button');
          del.className = 'btn-delete ms-auto';
          del.title = 'Delete post';
          del.innerHTML = '<i class="bi bi-trash"></i>';
          del.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!confirm('Delete this question and all its answers? This cannot be undone.')) return;
            await gql(DELETE_POST, { id: post.id });
            card.remove();
          });
          card.querySelector('.post-card-actions').appendChild(del);
        }

        card.querySelector('.toggle-btn').addEventListener('click', () => togglePost(card, post));
        container.appendChild(card);
      });
    }

    async function togglePost(card, post) {
      const panel = card.querySelector('.answers-panel');
      const btn = card.querySelector('.toggle-btn');
      const bodyEl = card.querySelector('.post-card-body-text');

      if (panel.style.display !== 'none') {
        panel.style.display = 'none';
        bodyEl.classList.remove('expanded');
        btn.innerHTML = 'View discussion <i class="bi bi-chevron-down ms-1"></i>';
        return;
      }

      bodyEl.classList.add('expanded');
      btn.innerHTML = 'Hide discussion <i class="bi bi-chevron-up ms-1"></i>';
      panel.style.display = 'block';
      panel.innerHTML = `
        <div class="text-muted small py-1">
          <span class="spinner-border spinner-border-sm me-1"></span>Loading answers…
        </div>`;

      await renderAnswers(panel, post.id);
    }

    async function renderAnswers(panel, postId) {
      const answers = await listAll(LIST_ANSWERS, { postId });
      answers.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

      panel.innerHTML = '';

      if (!answers.length) {
        const noAnswers = document.createElement('p');
        noAnswers.className = 'text-muted small mb-2';
        noAnswers.textContent = 'No answers yet — be the first!';
        panel.appendChild(noAnswers);
      } else {
        answers.forEach(ans => {
          const div = document.createElement('div');
          div.className = 'answer-item';
          div.innerHTML = `
            <div class="d-flex align-items-center justify-content-between">
              <div class="answer-item-meta">${escHtml(ans.authorName || 'Anonymous')} &middot; ${relativeTime(ans.createdAt)}</div>
            </div>
            <div>${escHtml(ans.body)}</div>
          `;
          if (isStaff()) {
            const del = document.createElement('button');
            del.className = 'btn-delete';
            del.title = 'Delete answer';
            del.innerHTML = '<i class="bi bi-trash"></i>';
            del.addEventListener('click', async () => {
              if (!confirm('Delete this answer?')) return;
              await gql(DELETE_ANSWER, { id: ans.id });
              div.remove();
            });
            div.querySelector('.d-flex').appendChild(del);
          }
          panel.appendChild(div);
        });
      }

      const form = document.createElement('div');
      form.className = 'answer-form mt-2';
      form.innerHTML = `
        <div id="ans-error-${postId}" class="alert alert-danger" style="display:none;"></div>
        <textarea class="form-control mb-2" placeholder="Write your answer…"
          id="ans-body-${postId}" rows="3"></textarea>
        <button class="btn btn-sm btn-forum-primary" id="ans-submit-${postId}">Post answer</button>
      `;
      panel.appendChild(form);

      document.getElementById(`ans-submit-${postId}`).addEventListener('click', async () => {
        const bodyEl = document.getElementById(`ans-body-${postId}`);
        const errEl = document.getElementById(`ans-error-${postId}`);
        const body = bodyEl.value.trim();
        if (!body) {
          errEl.textContent = 'Please write an answer before posting.';
          errEl.style.display = 'block';
          return;
        }
        errEl.style.display = 'none';
        const btn = document.getElementById(`ans-submit-${postId}`);
        btn.disabled = true;
        btn.textContent = 'Posting…';
        try {
          await gql(CREATE_ANSWER, {
            input: {
              postId,
              body,
              authorName: localStorage.getItem('displayName') || 'Anonymous',
              authorEmail: localStorage.getItem('userEmail') || '',
            }
          });
          bodyEl.value = '';
          await renderAnswers(panel, postId);
        } catch (err) {
          console.error(err);
          errEl.textContent = 'Failed to post. Please try again.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Post answer';
        }
      });
    }

    // ── Search ───────────────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('forum-search').addEventListener('input', (e) => {
        const term = e.target.value.trim();
        document.getElementById('forum-search-clear').style.display = term ? 'block' : 'none';
        clearTimeout(_searchDebounce);
        _searchDebounce = setTimeout(() => runSearch(term), 300);
      });

      document.getElementById('forum-search-clear').addEventListener('click', () => {
        document.getElementById('forum-search').value = '';
        document.getElementById('forum-search-clear').style.display = 'none';
        runSearch('');
      });
    });

    async function runSearch(term) {
      if (!term) {
        activateSection(activeSection);
        return;
      }

      setActiveTab(null); // deselect tabs during search
      document.getElementById('forum-content').innerHTML = `
        <div class="text-center py-5 text-muted">
          <div class="spinner-border spinner-border-sm" role="status"></div>
          <span class="ms-2">Searching…</span>
        </div>`;

      try {
        if (!_searchCache) {
          _searchCache = await listAll(LIST_ALL_POSTS, {});
        }
        const q = term.toLowerCase();
        const matched = _searchCache
          .filter(p => p.title.toLowerCase().includes(q) || p.body.toLowerCase().includes(q))
          .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

        // Show a heading above the results
        const heading = document.createElement('p');
        heading.className = 'text-muted small mb-2';
        heading.textContent = matched.length
          ? `${matched.length} result${matched.length !== 1 ? 's' : ''} for "${term}"`
          : `No results for "${term}"`;

        document.getElementById('forum-content').innerHTML = '';
        document.getElementById('forum-content').appendChild(heading);
        renderPostList(matched, true);
      } catch (err) {
        console.error(err);
        document.getElementById('forum-content').innerHTML =
          '<div class="alert alert-danger">Search failed. Please try again.</div>';
      }
    }

    // ── Ask modal ────────────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('ask-submit').addEventListener('click', async () => {
        const title = document.getElementById('ask-title').value.trim();
        const section = document.getElementById('ask-section').value;
        const body = document.getElementById('ask-body').value.trim();
        const errEl = document.getElementById('ask-error');
        errEl.style.display = 'none';

        if (!section) {
          errEl.textContent = 'Please choose a section for your question.';
          errEl.style.display = 'block';
          return;
        }
        if (!title) {
          errEl.textContent = 'Please add a title for your question.';
          errEl.style.display = 'block';
          return;
        }
        if (!body) {
          errEl.textContent = 'Please add some detail before posting.';
          errEl.style.display = 'block';
          return;
        }

        const btn = document.getElementById('ask-submit');
        btn.disabled = true;
        btn.textContent = 'Posting…';

        try {
          await gql(CREATE_POST, {
            input: {
              section,
              title,
              body,
              authorName: localStorage.getItem('displayName') || 'Anonymous',
              authorEmail: localStorage.getItem('userEmail') || '',
            }
          });
          document.getElementById('ask-title').value = '';
          document.getElementById('ask-section').value = '';
          document.getElementById('ask-body').value = '';
          bootstrap.Modal.getInstance(document.getElementById('askModal')).hide();
          _searchCache = null;
          // Navigate to the section the question was posted in
          history.replaceState(null, '', '#' + section);
          activateSection(section);
        } catch (err) {
          console.error(err);
          errEl.textContent = 'Failed to post your question. Please try again.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Post question';
        }
      });

      document.getElementById('askModal').addEventListener('hidden.bs.modal', () => {
        document.getElementById('ask-error').style.display = 'none';
        const btn = document.getElementById('ask-submit');
        btn.disabled = false;
        btn.textContent = 'Post question';
      });
    });

    // ── Hash navigation (sidebar links update the hash, this handles the change) ─

    window.addEventListener('hashchange', () => {
      const section = window.location.hash.slice(1);
      if (section && SECTION_MAP[section]) activateSection(section);
    });

    // ── Init ─────────────────────────────────────────────────────────────────────

    window.onload = () => {
      auth(
        document.querySelector('.loginBtn'),
        document.querySelector('.profileBtn'),
        document.querySelector('#sessionsLink')
      );
      checkReleaseDates();
      buildTabs();
      activateSection(activeSection);
    };

    function createPath(options) {
      window.location = getPath() + options;
      return false;
    }

    function logUserOut() {
      logout();
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>
</body>

</html>
