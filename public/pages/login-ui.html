<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code the Future - Login</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../styles/mainStyle.css">
  
  <!-- Amplify UI CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@aws-amplify/ui@6/dist/styles.css">
  
  <style>
    .auth-container {
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
    }
    
    .cohort-input-section {
      margin-bottom: 20px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    
    .cohort-status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 4px;
    }
    
    .cohort-valid {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .cohort-invalid {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    #authenticator-container {
      display: none;
    }
    
    #authenticator-container.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="auth-container">
      <div class="text-center mb-4">
        <img src="../images/logo.png" alt="Code the Future" style="max-width: 200px;">
        <h2 class="mt-3">Welcome Back</h2>
      </div>
      
      <!-- Cohort Code Input (for new registrations) -->
      <div id="cohort-section" class="cohort-input-section">
        <h5>New User? Enter Cohort Code</h5>
        <p class="text-muted small">If you're registering for the first time, enter your cohort code below.</p>
        <div class="input-group">
          <input type="text" id="cohort-code-input" class="form-control" placeholder="Enter cohort code (e.g., TEST2024)">
          <button class="btn btn-primary" onclick="validateCohort()">Validate</button>
        </div>
        <div id="cohort-status"></div>
        <p class="text-muted small mt-2">Already have an account? Just sign in below.</p>
      </div>
      
      <!-- Amplify Authenticator -->
      <div id="authenticator-container">
        <div id="authenticator"></div>
      </div>
    </div>
  </div>

  <!-- Amplify UI Web Components -->
  <script type="module">
    import { Amplify } from 'https://cdn.jsdelivr.net/npm/aws-amplify@6/+esm';
    import { Authenticator } from 'https://cdn.jsdelivr.net/npm/@aws-amplify/ui@6/+esm';
    import { signOut, getCurrentUser, fetchAuthSession } from 'https://cdn.jsdelivr.net/npm/aws-amplify@6/auth/+esm';
    import { generateClient } from 'https://cdn.jsdelivr.net/npm/aws-amplify@6/data/+esm';
    
    // Load configuration
    let client;
    let validatedCohort = null;
    
    async function initAmplify() {
      try {
        const response = await fetch('/amplify_outputs.json');
        const config = await response.json();
        Amplify.configure(config);
        client = generateClient();
        console.log('✅ Amplify configured');
        
        // Show authenticator
        document.getElementById('authenticator-container').classList.add('show');
        
        // Initialize Authenticator
        const authenticator = new Authenticator({
          loginMechanisms: ['email'],
          signUpAttributes: ['name'],
          formFields: {
            signUp: {
              name: {
                order: 1,
                placeholder: 'Enter your full name',
                label: 'Full Name',
                required: true
              },
              email: {
                order: 2,
                placeholder: 'Enter your email',
                label: 'Email',
                required: true
              },
              password: {
                order: 3,
                placeholder: 'Enter your password',
                label: 'Password',
                required: true
              },
              confirm_password: {
                order: 4,
                placeholder: 'Confirm your password',
                label: 'Confirm Password',
                required: true
              }
            }
          }
        });
        
        // Mount authenticator
        document.getElementById('authenticator').appendChild(authenticator);
        
        // Listen for auth state changes
        authenticator.addEventListener('authStateChange', async (event) => {
          const { authState, user } = event.detail;
          
          if (authState === 'signedIn' && user) {
            console.log('User signed in:', user);
            await handleSignIn(user);
          }
        });
        
        // Check if already signed in
        try {
          const user = await getCurrentUser();
          if (user) {
            await handleSignIn(user);
          }
        } catch (e) {
          console.log('Not signed in');
        }
        
      } catch (error) {
        console.error('Failed to initialize Amplify:', error);
        alert('Failed to load authentication system. Please refresh the page.');
      }
    }
    
    async function handleSignIn(user) {
      try {
        // Get user attributes
        const session = await fetchAuthSession();
        const email = user.signInDetails?.loginId || user.username;
        
        // Check if user exists in DynamoDB
        const { data: users } = await client.models.User.list({
          filter: { email: { eq: email } }
        });
        
        if (users && users.length > 0) {
          // Existing user - load their data
          const userData = users[0];
          localStorage.setItem('loggedIn', 'true');
          localStorage.setItem('userEmail', email);
          localStorage.setItem('displayName', userData.displayName);
          localStorage.setItem('userId', user.userId);
          if (userData.cohortId) localStorage.setItem('cohortId', userData.cohortId);
          if (userData.isTutor) localStorage.setItem('isTutor', 'true');
          if (userData.isTeacher) localStorage.setItem('isTeacher', 'true');
          
          // Redirect to sessions
          window.location.href = './sessions.html';
        } else {
          // New user - need to create profile
          if (!validatedCohort) {
            alert('Please validate your cohort code before registering.');
            await signOut();
            return;
          }
          
          // Create user in DynamoDB
          const isTutor = validatedCohort.cohortCode === 'cTfTut0rCod3!1';
          
          await client.models.User.create({
            email: email,
            displayName: user.signInDetails?.loginId || email,
            cohortId: validatedCohort.id,
            isTeacher: false,
            isTutor: isTutor,
            progress: {},
            profile: {}
          });
          
          localStorage.setItem('loggedIn', 'true');
          localStorage.setItem('userEmail', email);
          localStorage.setItem('displayName', user.signInDetails?.loginId || email);
          localStorage.setItem('cohortId', validatedCohort.id);
          if (isTutor) localStorage.setItem('isTutor', 'true');
          
          // Redirect to sessions
          window.location.href = './sessions.html';
        }
      } catch (error) {
        console.error('Error handling sign in:', error);
        alert('Error setting up your account. Please try again.');
      }
    }
    
    // Expose validate function to global scope
    window.validateCohort = async function() {
      const cohortCode = document.getElementById('cohort-code-input').value.trim();
      const statusDiv = document.getElementById('cohort-status');
      
      if (!cohortCode) {
        statusDiv.innerHTML = '<div class="cohort-invalid">Please enter a cohort code</div>';
        return;
      }
      
      try {
        const { data: cohorts } = await client.models.Cohort.list({
          filter: { cohortCode: { eq: cohortCode } }
        });
        
        if (cohorts && cohorts.length > 0) {
          validatedCohort = cohorts[0];
          statusDiv.innerHTML = `<div class="cohort-valid">✓ Valid cohort: ${cohorts[0].name}</div>`;
        } else {
          validatedCohort = null;
          statusDiv.innerHTML = '<div class="cohort-invalid">✗ Invalid cohort code</div>';
        }
      } catch (error) {
        console.error('Error validating cohort:', error);
        statusDiv.innerHTML = '<div class="cohort-invalid">Error validating cohort code</div>';
      }
    };
    
    // Initialize on load
    initAmplify();
  </script>
</body>
</html>
